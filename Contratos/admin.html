<!DOCTYPE html>
<html>
<body>
    <h2>Conversor de Assinaturas</h2>
    <textarea id="base64Input" placeholder="Cole o código Base64 aqui..."></textarea><br>
    <button onclick="converter()">Converter para Imagem</button>
    <div id="resultado"></div>

    <script>
        function converter() {
            const code = document.getElementById('base64Input').value;
            const img = document.createElement('img');
            img.src = code;
            document.getElementById('resultado').innerHTML = '';
            document.getElementById('resultado').appendChild(img);
        }
    </script>
</body>
</html>
